<svg width="500" height="145" viewBox="0 0 500 145"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="GERO – Enterprise Resource Planning">

  <defs>

    <!-- Badge background: deep navy to corporate blue -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#16255c"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Top sheen on badge -->
    <linearGradient id="badgeSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Vertical divider fade -->
    <linearGradient id="divGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="82%"  stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip badge shape (used for sheen and gold strip) -->
    <clipPath id="badgeClip">
      <rect x="10" y="10" width="118" height="118" rx="18"/>
    </clipPath>

    <!-- Drop shadow for badge -->
    <filter id="badgeDrop" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="7"
                    flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>

    <!-- Subtle glow behind G mark -->
    <filter id="gGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>


  <!-- ══ BADGE (icon mark) ══════════════════════════════════════ -->

  <!-- Badge body + shadow -->
  <g filter="url(#badgeDrop)">
    <rect x="10" y="10" width="118" height="118" rx="18"
          fill="url(#badgeGrad)"/>
  </g>

  <!-- Top-of-badge sheen (glass effect) -->
  <rect x="10" y="10" width="118" height="52"
        fill="url(#badgeSheen)" clip-path="url(#badgeClip)"/>

  <!-- Amber accent strip at bottom of badge -->
  <rect x="10" y="108" width="118" height="20"
        fill="#f59e0b" clip-path="url(#badgeClip)"/>

  <!-- Thin white separator above amber strip -->
  <rect x="10" y="107" width="118" height="1"
        fill="white" opacity="0.20" clip-path="url(#badgeClip)"/>

  <!--
    G lettermark — clean geometric arc + crossbar
    Center: (69, 59)  Radius: 26
    Start point at SVG 315° (NE, upper-right): (87, 41)
    End  point at SVG   0° (E,  right):        (95, 59)
    Arc flags: large-arc=1, sweep=0 (counter-clockwise)
    → traces: upper-right → top → left → bottom → right
    Crossbar: L 79 59  (extends inward ~40% of radius)
  -->
  <path d="M 87 41 A 26 26 0 1 0 95 59 L 79 59"
        fill="none"
        stroke="white"
        stroke-width="11"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#gGlow)"/>


  <!-- ══ VERTICAL DIVIDER ═══════════════════════════════════════ -->
  <rect x="148" y="30" width="2" height="83"
        rx="1" fill="url(#divGrad)"/>


  <!-- ══ WORDMARK ══════════════════════════════════════════════ -->

  <!-- "GERO" full text in navy (base layer) -->
  <text x="163" y="74"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="50" font-weight="800"
        letter-spacing="5"
        fill="#16255c">GERO</text>

  <!-- "G" overlay in amber — creates visual link between badge G and wordmark -->
  <text x="163" y="74"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="50" font-weight="800"
        letter-spacing="5"
        fill="#f59e0b">G</text>


  <!-- ══ ERP PILL BADGE ════════════════════════════════════════ -->
  <rect x="323" y="50" width="46" height="21" rx="5"
        fill="#f59e0b"/>
  <text x="346" y="64"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="700"
        letter-spacing="1.5"
        fill="#16255c"
        text-anchor="middle">ERP</text>


  <!-- ══ TAGLINE ════════════════════════════════════════════════ -->
  <text x="163" y="101"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="17.5" font-weight="400"
        letter-spacing="3.2"
        fill="#64748b"> GERO SYSTEM</text>


  <!-- ══ SUBTLE BOTTOM RULE ════════════════════════════════════ -->
  <!-- Thin amber line anchoring the whole badge area -->
  <rect x="163" y="112" width="210" height="1.5"
        rx="1" fill="#f59e0b" opacity="0.35"/>

</svg>
